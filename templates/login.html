<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - CurricuForge</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['"Inter"', 'sans-serif'] },
                    colors: {
                        brand: { DEFAULT: '#4F46E5', light: '#6366F1' },
                        cyber: { DEFAULT: '#22D3EE', light: '#67E8F9' },
                        darkbg: { DEFAULT: '#0F172A', card: '#1E293B' }
                    },
                    boxShadow: {
                        'glow-brand': '0 0 20px -5px rgba(79, 70, 229, 0.5)',
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.3)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0F172A;
            color: #F8FAFC;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--tw-shadow-glass);
        }

        .ambient-blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
            animation: float 20s infinite alternate ease-in-out;
            pointer-events: none;
        }

        .blob-1 {
            top: -20%;
            left: -20%;
            width: 60vw;
            height: 60vw;
            background: rgba(79, 70, 229, 0.2);
            animation-delay: 0s;
        }

        .blob-2 {
            bottom: -20%;
            right: -20%;
            width: 60vw;
            height: 60vw;
            background: rgba(34, 211, 238, 0.15);
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        .cyber-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .cyber-input:focus {
            outline: none;
            border-color: #4F46E5;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4F46E5, #4338CA);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.6);
        }

        .auth-card {
            opacity: 0;
            transform: translateY(20px);
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen relative p-6">

    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[-1]">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
        <div
            class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMykiLz48L3N2Zz4=')] opacity-50">
        </div>
    </div>

    <a href="/"
        class="absolute top-8 left-8 text-slate-400 hover:text-white flex items-center gap-2 text-sm font-medium transition-colors z-10 btn-outline glass-panel px-4 py-2 rounded-lg">
        <i class="ph-bold ph-arrow-left"></i> Core Interface
    </a>

    <div class="w-full max-w-sm auth-card z-10">
        <div class="text-center mb-8">
            <div
                class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-brand to-cyber flex items-center justify-center shadow-glow-brand mb-6 border border-white/20">
                <i class="ph-bold ph-lightning text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight mb-2">Welcome Back</h1>
            <p class="text-sm text-slate-400 font-medium">Re-initialize your connection to CurricuForge.</p>
        </div>

        <div
            class="glass-panel p-8 rounded-3xl w-full border border-brand/20 shadow-glow-brand relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-cyber/10 rounded-full blur-[40px] pointer-events-none">
            </div>

            <form id="login-form" class="space-y-5 relative z-10">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-2 tracking-widest uppercase">Email
                        Vector</label>
                    <input type="email" id="email" required class="cyber-input w-full px-4 py-3 rounded-xl text-sm"
                        placeholder="agent@nexus.io">
                </div>
                <div>
                    <label
                        class="block text-xs font-bold text-slate-400 mb-2 tracking-widest uppercase flex justify-between">
                        <span>Access Key</span>
                        <a href="#" class="text-cyber hover:text-cyber-light normal-case tracking-normal">Forgot?</a>
                    </label>
                    <input type="password" id="password" required
                        class="cyber-input w-full px-4 py-3 rounded-xl text-sm" placeholder="••••••••">
                </div>
                <button type="submit" id="submit-btn"
                    class="btn-primary w-full py-4 text-sm mt-4 rounded-xl font-bold flex items-center justify-center gap-2">
                    Initialize Session <i class="ph-bold ph-arrow-right"></i>
                </button>
            </form>

            <div class="mt-8 text-center text-sm font-medium text-slate-400 relative z-10">
                Need verification clearance? <a href="/signup" class="text-cyber hover:underline font-bold">Sign up</a>
            </div>

            <div id="toast"
                class="hidden mt-6 p-4 rounded-xl bg-red-900/50 backdrop-blur border border-red-500/50 text-red-200 text-sm font-bold flex items-center gap-3 relative z-10 shadow-[0_0_15px_rgba(239,68,68,0.2)]">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            gsap.to('.auth-card', { y: 0, opacity: 1, duration: 0.8, ease: 'power3.out' });
        });

        if (localStorage.getItem('token')) { window.location.href = '/dashboard'; }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin"></i> Establishing Link...`;
            btn.disabled = true;

            const toast = document.getElementById('toast');
            toast.classList.add('hidden');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const params = new URLSearchParams();
                params.append('username', email);
                params.append('password', password);

                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });

                if (!res.ok) {
                    const data = await res.json();
                    let errMsg = "Access Denied.";
                    if (data.detail) errMsg = Array.isArray(data.detail) ? data.detail[0].msg : data.detail;
                    throw new Error(errMsg);
                }

                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                // Redirect animation
                gsap.to('.auth-card', { y: -20, opacity: 0, duration: 0.4, onComplete: () => { window.location.href = "/dashboard"; } });

            } catch (err) {
                toast.innerHTML = `<i class="ph-fill ph-warning-circle text-lg"></i> <span class="flex-1">${err.message}</span>`;
                toast.classList.remove('hidden');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
